baseURL = "https://deardhruv.com"
title   = "Dhruv's blog"

DefaultContentLanguage = "en"

theme = "hello-friend-ng"

PygmentsCodeFences = true
PygmentsStyle = "monokai"

rssLimit  = 10  # Maximum number of items in the RSS feed.
copyright = "This work is licensed under a Creative Commons Attribution-NonCommercial 4.0 International License." # This message is only used by the RSS template.

[services]
  [services.googleAnalytics]
    ID = 'G-230251097' # Verify this ID, usually it starts with G- for modern GA4

archetypeDir = "archetypes"
contentDir   = "content"
dataDir      = "data"
layoutDir    = "layouts"
publishDir   = "public"

buildDrafts  = false
buildFuture  = false
buildExpired = false
canonifyURLs = true

enableRobotsTXT = true
enableGitInfo   = false
enableEmoji     = true
enableMissingTranslationPlaceholders = false
disableRSS     = false
disableSitemap = false
disable404     = false
disableHugoGeneratorInject = false

[sitemap]
  changefreq = "monthly"
  filename = "sitemap.xml"
  priority = 0.5

[params]
  dateform        = "Jan 2, 2006"
  dateformShort   = "Jan 2"
  dateformNum     = "2006-01-02"
  dateformNumTime = "2006-01-02 15:04"

  # Metadata mostly used in document's head
  description = "Dhruv Patel's personal blog about technology, Android engineering, and a step towards technology."
  keywords = "Dhruv Patel, DearDhruv, Android Engineer, Blog, Technology, Android Development, Software Engineering"
  images = ["/pp/pro_pic.jpg"]

  homeSubtitle = "Lead Android Engineer | A step towards technology"

  [params.Author]
    name = "Dhruv Patel"
    email = "dhruv.time@gmail.com"

  # [params.portrait]
  #   path     = "/pp/pro_pic.jpg"
  #   alt      = "Dhruv Patel"
  #   maxWidth = "100px"

  [params.footer]
    trademark = "Dhruv Patel"
    author = true
    copyright = true
    rss = true
    # topText = ["Left text", "Right text"]
    bottomText = ["Powered by <a href=\"http://gohugo.io\">Hugo</a>", "Made with &#10084; by <a href=\"https://github.com/rhazdon\">Djordje Atlialp</a>"]

  # Enable theme toggle
  enableThemeToggle = true

  # Sharing buttons
  enableSharingButtons = true

  # Reading time
  enableReadingTime = true

  # Plausible.io (Optional)
  # plausibleDataDomain = ""
  # plausibleScriptSource = ""


  # Prefix of link to the git commit detail page. GitInfo must be enabled.
  # gitUrl = ""

  # Set disableReadOtherPosts to true in order to hide the links to other posts.
  disableReadOtherPosts = false

  # Integrate Javascript files or stylesheets by adding the url to the external assets or by
  # linking local files with their path relative to the static folder, e.g. "css/styles.css"
  customCSS = ["css/custom.css"]
  customJS  = []

  # Toggle this option need to rebuild SCSS, requires extended version of Hugo
  justifyContent = true  # Set "text-align: justify" to .content.

  # Directory name of your blog content (default is `content/posts`)
  contentTypeName = "posts"

  # Default theme "light" or "dark"
  defaultTheme = "dark"
  themeColor = "#252627"

  # Colors for favicons
  [params.favicon.color]
    mask = "#252627"
    msapplication = "#252627"
    theme = "#252627"

  [params.logo]
    logoText     = "$ cd /home/"
    logoHomeLink = "/"
    # Set true to remove the logo cursor entirely.
    # logoCursorDisabled = false
    # Set to a valid CSS color to change the cursor in the logo.
    # logoCursorColor    = "#67a2c9"
    # Set to a valid CSS time value to change the animation duration, "0s" to disable.
    # logoCursorAnimate  = "2s"

  # Social icons
  [[params.social]]
    name = "twitter"
    url  = "https://twitter.com/DearDhruv"

  [[params.social]]
    name = "github"
    url  = "https://github.com/DearDhruv"

  [[params.social]]
    name = "linkedin"
    url  = "https://www.linkedin.com/in/DearDhruv"

  [[params.social]]
    name = "instagram"
    url  = "https://www.instagram.com/deardhruv"

  [[params.social]]
    name = "facebook"
    url  = "https://www.facebook.com/deardhruv"

  [[params.social]]
    name = "stackoverflow"
    url  = "https://www.stackoverflow.com/users/596566/deardhruv"

  # [[params.social]]
  #   name = "email"
  #   url  = "mailto:nobody@example.com"

[languages]
  [languages.en]
    # subtitle  = "Hello Friend NG Theme"
    weight    = 1
    copyright = '<a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'

#  [languages.fr]
#    # subtitle  = "Hello Friend NG Theme"
#    weight    = 2
#    copyright = '<a href="https://creativecommons.org/licenses/by-nc/4.0/" target="_blank" rel="noopener">CC BY-NC 4.0</a>'

[menu]
  [[menu.main]]
    identifier = "about"
    name       = "About"
    url        = "about/"
  [[menu.main]]
    identifier = "posts"
    name       = "Posts"
    url        = "posts/"
  [[menu.main]]
    identifier = "sitemap"
    name       = "Sitemap"
    url        = "sitemap/"
